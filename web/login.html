<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>ServerStatus 后台登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1a 0%, #03060c 100%);
            font-family: 'Courier New', 'Monaco', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        /* 动态网格背景 */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }
        /* 扫描线 */
        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,255,255,0.02) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            animation: scan 8s linear infinite;
        }
        @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
        .login-container {
            position: relative;
            z-index: 10;
            width: 360px;
            background: rgba(0, 20, 40, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.1);
        }
        .login-container h2 {
            text-align: center;
            color: #0ff;
            font-size: 20px;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #0ff;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            color: #8cf;
            font-size: 12px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 4px;
            color: #0ff;
            font-family: monospace;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .input-group input:focus {
            border-color: #0ff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        button {
            width: 100%;
            padding: 10px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            border-radius: 4px;
            color: #0ff;
            font-family: monospace;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 2px;
        }
        button:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 15px #0ff;
        }
        .error {
            color: #f44;
            text-align: center;
            font-size: 12px;
            margin-top: 15px;
            padding: 8px;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #f44;
            border-radius: 4px;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 10px;
            color: #6af;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h2><i class="fas fa-shield-alt"></i> 后台登录</h2>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
        <div class="input-group">
            <label>用户名</label>
            <input type="text" name="username" autocomplete="off" required>
        </div>
        <div class="input-group">
            <label>密码</label>
            <input type="password" name="password" autocomplete="off" required>
        </div>
        <button type="submit">登 录</button>
    </form>
    <div class="footer">Powered by ServerStatus</div>
</div>
<script>
// 防扒：禁用右键/F12
(function() {
    var isBot = /bot|googlebot|baiduspider|yandex|sogou|360spider|bingbot|slurp/i.test(navigator.userAgent);
    if (!isBot) {
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
        });
        document.addEventListener('selectstart', function(e) { e.preventDefault(); });
        document.addEventListener('copy', function(e) { e.preventDefault(); });
    }
})();
</script>
</body>
</html>
