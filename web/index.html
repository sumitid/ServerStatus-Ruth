<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="ServerStatus云监控 - 实时服务器状态监控，支持三网延迟探测，多服务器集中管理">
    <meta name="keywords" content="ServerStatus,服务器监控,云监控,三网延迟,服务器状态,VPS监控">
    <meta name="author" content="ServerStatus">
    <meta name="robots" content="index, follow">
    <title>ServerStatus云监控 - 服务器状态实时监控面板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <div class="navbar">
        <a class="navbar-brand" href="/">
            <i class="fas fa-server"></i> ServerStatus 云监控
        </a>
        <button class="theme-btn" id="themeToggleBtn">
            <i class="fas fa-moon"></i> 黑夜模式
        </button>
    </div>
    
    <div class="content">
        <div id="loading-notice" class="alert alert-info text-center">
            <i class="fas fa-sync fa-spin"></i> 加载中...
        </div>
        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th>协议</th>
                        <th>月流量↓/↑</th>
                        <th>节点</th>
                        <th class="mobile-hidden">虚拟化</th>
                        <th class="mobile-hidden">位置</th>
                        <th>在线</th>
                        <th>运行时间</th>
                        <th>负载</th>
                        <th>网络↓/↑</th>
                        <th class="mobile-hidden">总流量↓/↑</th>
                        <th>CPU</th>
                        <th>内存</th>
                        <th class="mobile-hidden">硬盘</th>
                        <th>联通</th>
                        <th>电信</th>
                        <th>移动</th>
                    </tr>
                </thead>
                <tbody id="servers"></tbody>
            </table>
        </div>
                <div class="text-center">
            <div id="updated" class="updated-time" style="display: inline-block;"><i class="fas fa-sync"></i> 更新中...</div>
        </div>
    </div>
    
    <div style="margin: 15px 0 8px 0; padding: 8px 12px; border: 1px solid rgba(0,255,255,0.3); border-radius: 6px; background: rgba(0,0,0,0.2);">
        <div id="friend-links" style="text-align: left;"></div>
    </div>
    
    <div style="margin-top: 8px; padding: 8px 0; text-align: center; font-size: 11px;">
        Powered by <a href="https://github.com/sumitid/ServerStatus-Ruth" target="_blank" style="text-decoration: none;">ServerStatus</a>
    </div>
</div>

<script>
function loadFriendLinks() {
    fetch('/api/links')
        .then(res => res.json())
        .then(data => {
            var html = '';
            for (var i = 0; i < data.length; i++) {
                html += '<a href="' + data[i].url + '" target="_blank" rel="noopener noreferrer" style="text-decoration: none; margin-right: 15px; font-size: 11px;">' + escapeHtml(data[i].name) + '</a>';
            }
            document.getElementById('friend-links').innerHTML = html || '<span style="color:#6af;">暂无友情链接</span>';
        })
        .catch(() => {
            document.getElementById('friend-links').innerHTML = '<span style="color:#6af;">暂无友情链接</span>';
        });
}

function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/[&<>]/g, function(m) {
        return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
    });
}

loadFriendLinks();
</script>

<div id="rightClickModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:#fff; border-radius:16px; padding:25px; text-align:center; max-width:300px; margin:auto;">
        <i class="fas fa-heart" style="font-size:48px; color:#4BDB42;"></i>
        <h3 style="margin:15px 0 10px;">用爱发电</h3>
        <p style="margin-bottom:20px;">请多一点理解，谢谢您的支持</p>
        <button onclick="closeModal()" style="background:#4BDB42; border:none; padding:8px 24px; border-radius:30px; cursor:pointer;">确定</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>

 
</body>
</html>
